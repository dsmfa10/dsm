SPECIFICATION Spec

\* Extended bounded regression profile.
\* This stays out of the default fast gate and exists to cover deeper activation /
\* emission bookkeeping without switching to the unbounded exploratory config.

CONSTANT
    DeviceIds = {d1, d2, d3}
    GenesisIds = {g1}
    MaxDevices = 2
    MaxPayload = 1
    VaultIds = {v1}
    MaxVaults = 1
    ShardDepth = 1
    MaxEmissions = 2
    EmissionAmount = 1
    MaxSupply = 2
    MaxNet = 4
    MaxDupPerMsg = 1
    MaxStep = 10
    UseHarness = TRUE

INVARIANT
    TypeInvariant
    NoDuplicateDevices
    ActiveRelationshipsSymmetric
    VaultsOwnedByCreator
    OfflineSessionsSymmetric
    DJTESafety
    ConcreteRefinesAbstract
    RefinementStrengthening
    SourceVaultBounded

PROPERTY
    SpentJapsNeverShrink
    CommitNeverDecreasesConcrete
    SourceRemainingNeverIncreases

CONSTRAINT
    StepBound
