\* ===========================================================================
\* DSM Offline Finality — TLC Model Checker Configuration
\*
\* 2-device model with 2 sessions (s1, s2) to verify that the Tripwire
\* prevents double-commit from the same chain tip. MaxChain=3 allows
\* enough transitions to exercise the full 3-phase protocol while keeping
\* the state space tractable.
\*
\* Run: cd tla && tlc DSM_OfflineFinality -config DSM_OfflineFinality.cfg -workers auto
\* ===========================================================================

SPECIFICATION Spec

\* ---- Model Values ----
CONSTANT
    d1 = d1
    d2 = d2
    Device = {d1, d2}
    s1 = s1
    s2 = s2
    SessionId = {s1, s2}
    MaxChain = 3
    INITIAL_BALANCE = 3
    NULL = NULL

\* ---- Safety Invariants ----
INVARIANT
    TypeOK
    BilateralIrreversibility
    FullSettlement
    NoHalfCommit
    TripwireGuaranteesUniqueness
    TokenConservation
    BalancesNonNegative

\* ---- Liveness Properties ----
\* Liveness is opt-in (--include-liveness) due to state space cost with
\* 2 sessions + MaxChain=3. Safety invariants are the primary gate.
\* PROPERTY
\*     SessionTermination
\*     BlePartitionRecovery

\* ---- Deadlock Detection ----
CHECK_DEADLOCK FALSE
