name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --------------------------------------------------------------------------
  # Rust: format, clippy, build, test
  # --------------------------------------------------------------------------
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install CI system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler ripgrep

      - name: Protocol purity checks
        run: |
          bash ci/no_clock_and_no_json.sh
          bash scripts/flow_assertions.sh
          bash scripts/flow_mapping_assertions.sh
          bash scripts/check_forbidden_symbols.sh
          bash scripts/ci_scan.sh
          bash ci/canonical_bilateral_gates.sh

      - name: Production safety lints
        run: bash ci/production_safety_checks.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings -A clippy::disallowed_methods

      - name: Build
        run: cargo build --locked --workspace --all-features

      - name: Test
        run: |
          cargo test --locked --workspace --exclude dsm_storage_node -- --nocapture
          cargo test --locked -p dsm_storage_node --no-default-features --features local-dev,strict -- --nocapture

      - name: Codegen enforcement
        run: |
          bash scripts/codegen_enforce.sh
          bash scripts/guard_protos.sh

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet || true
          cargo audit

  # --------------------------------------------------------------------------
  # Formal validation: TLA+ model checking + real-code bridge harness
  # --------------------------------------------------------------------------
  formal-validation:
    name: Formal Validation
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: Swatinem/rust-cache@v2

      - name: Install formal validation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: TLA+ model checks
        run: cargo run --locked -p dsm_vertical_validation -- tla-check

      - name: Real-code bridge properties
        run: cargo run --locked -p dsm_vertical_validation -- property-tests --iterations 5 --seed 42

      - name: Direct implementation traces
        run: cargo run --locked -p dsm_vertical_validation -- implementation-traces

  # --------------------------------------------------------------------------
  # Frontend: type-check, lint, test, build
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dsm_client/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dsm_client/frontend/package-lock.json

      - name: Cache frontend dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            dsm_client/frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('dsm_client/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test -- --passWithNoTests --ci

      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # Coverage: Rust + frontend reports, Codecov upload, aggregate summary
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dsm_client/frontend/package-lock.json

      - name: Install coverage deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler ripgrep

      - name: Install frontend dependencies
        working-directory: dsm_client/frontend
        run: npm ci

      - name: Generate Rust coverage artifacts
        run: |
          mkdir -p coverage
          cargo llvm-cov clean --workspace
          cargo llvm-cov --locked --workspace --exclude dsm_storage_node --no-report -- --nocapture
          cargo llvm-cov --locked -p dsm_storage_node --no-default-features --features local-dev,strict --no-report -- --nocapture
          cargo llvm-cov report --json --output-path coverage.json
          cargo llvm-cov report --lcov --output-path coverage/rust.lcov

      - name: Generate frontend coverage artifacts
        working-directory: dsm_client/frontend
        run: npm run test:coverage -- --passWithNoTests --ci

      - name: Build aggregate coverage summary
        run: |
          node scripts/aggregate_coverage.mjs

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/rust.lcov
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
          use_oidc: true

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: dsm_client/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true
          use_oidc: true

      - name: Upload coverage summary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: |
            coverage/aggregate.json
            coverage/rust.lcov
            dsm_client/frontend/coverage/lcov.info

  # --------------------------------------------------------------------------
  # Docker: storage node image
  # --------------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - name: Build storage node image
        run: docker build -f ci/docker/StorageNode.Dockerfile -t dsm/storage-node:ci .
