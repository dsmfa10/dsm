\* ===========================================================================
\* DSM Bilateral Liveness — TLC Model Checker Configuration
\*
\* 2-device model: d1/d2 form the bilateral pair.
\* The 3-device argument (recipient outside bilateral pair for DLVLiveness)
\* is a proof sketch — VaultExpire handles all-devices-dead unconditionally
\* without requiring a third device in the model.
\*
\* MaxChain reduced from 3 to 2: cuts chainTip space from 4^3=64 to 3^2=9.
\* 2 devices: all per-device maps go from cube to square, tractable for TLC.
\*
\* Run: cd tla && tlc DSM_BilateralLiveness -config DSM_BilateralLiveness.cfg -workers auto
\* ===========================================================================

SPECIFICATION Spec

\* ---- Model Values ----
CONSTANT
    d1 = d1
    d2 = d2
    Device = {d1, d2}
    s1 = s1
    SessionId = {s1}
    v1 = v1
    VaultId = {v1}
    MaxChain = 2
    INITIAL_BALANCE = 2
    NULL = NULL

\* ---- Safety Invariants ----
INVARIANT
    TypeOK
    NoFork
    TokenConservation
    ModalLockConsistency
    BalancesNonNegative

\* ---- Liveness Properties ----
PROPERTY
    SessionTermination
    ModalLockResolution
    DLVLiveness

\* ---- Deadlock Detection ----
CHECK_DEADLOCK TRUE
