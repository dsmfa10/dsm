SPECIFICATION Spec

\* Concrete DSM must refine the irreducible truth layer.
\* TLC expects a keyword block. Use REFINEMENT to select the abstract spec.
\* Refinement is checked via the explicit property `ConcreteRefinesAbstract`.
CONSTANT
    DeviceIds = {d1, d2}
    GenesisIds = {g1, g2}
    MaxDevices = 1
    MaxPayload = 1
    VaultIds = {v1}
    MaxVaults = 1
    ShardDepth = 1
    MaxEmissions = 1
    EmissionAmount = 1
    MaxSupply = 1
    MaxNet = 3
    MaxDupPerMsg = 1
    MaxStep = 10
    UseHarness = TRUE
INVARIANT
    TypeInvariant
    NoDuplicateDevices
    ActiveRelationshipsSymmetric
    VaultsOwnedByCreator
    OfflineSessionsSymmetric
    DJTESafety
    ConcreteRefinesAbstract
    RefinementStrengthening
    \* Debug: individual DJTE conjuncts (kept commented; enable to isolate failures)
    \* (moved above; uncomment DJTESafety to restore bundle)
    SourceVaultBounded

\* ConcreteRefinesAbstract is a state predicate; keep it as an INVARIANT so
\* TLC checks it in all reachable states (not only the initial state).

CONSTRAINT
    StepBound
