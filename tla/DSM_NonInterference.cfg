\* ===========================================================================
\* DSM Non-Interference — TLC Model Checker Configuration
\*
\* 4-device model with 2 disjoint bilateral pairs: {d1,d2} and {d3,d4}.
\* Each pair has 1 session. The state space factors as
\* |pair1_states| × |pair2_states| because pairs are independent.
\*
\* MaxChain=2 keeps the per-pair state space small. Two sessions (one per
\* pair) are sufficient to verify that operations on one pair cannot affect
\* the other.
\*
\* Run: cd tla && tlc DSM_NonInterference -config DSM_NonInterference.cfg -workers auto
\* ===========================================================================

SPECIFICATION Spec

\* ---- Model Values ----
CONSTANT
    d1 = d1
    d2 = d2
    d3 = d3
    d4 = d4
    Device = {d1, d2, d3, d4}
    r1 = r1
    r2 = r2
    Relationship = {r1, r2}
    Rel1Devices = {d1, d2}
    Rel2Devices = {d3, d4}
    s1 = s1
    s2 = s2
    SessionId = {s1, s2}
    MaxChain = 2
    INITIAL_BALANCE = 2
    NULL = NULL

\* ---- Safety Invariants ----
INVARIANT
    TypeOK
    NonInterference
    PairIsolation
    PerPairConservation
    ZeroRefreshForInactive

\* ---- No Liveness (safety-only spec) ----

\* ---- Deadlock Detection ----
CHECK_DEADLOCK FALSE
