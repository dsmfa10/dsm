    /* D-pad */
    .new-dpad {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
    }

    .new-dpad-plus {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 50%;
    }

  .new-dpad-background {
      position: absolute;
      width: 100%;
      height: 100%;
  background: var(--stateboy-shell);
      border-radius: 50%;
      top: 0;
      left: 0;
      box-shadow:
        inset 0 3px 16px rgba(0, 0, 0, 0.20),
        inset 0 1px 6px rgba(0, 0, 0, 0.18),
      inset 0 -3px 9px rgba(255, 255, 255, 0.05),
      var(--control-shell-glow, 0 0 0 rgba(0, 0, 0, 0));
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .new-dpad-vertical {
      position: absolute;
      width: 30px;
      height: 85px;
      background: linear-gradient(135deg, #ff0080 0%, #640134 100%);
      border-radius: 6px;
      top: 7.5px;
      left: 35px;
      box-shadow: 
        inset 0 1px 2px rgba(255, 255, 255, 0.4),
        inset 0 -1px 2px rgba(0, 0, 0, 0.4),
        0 2px 5px rgba(0, 0, 0, 0.5);
      border-top: 2px solid #d74f8e;
      transition: all 0.1s ease;
    }

    .new-dpad-horizontal {
      position: absolute;
      width: 85px;
      height: 30px;
      background: linear-gradient(135deg, #ff0080 0%, #640134 100%);
      border-radius: 6px;
      top: 35px;
      left: 7.5px;
      box-shadow: 
        inset 0 1px 2px rgba(255, 255, 255, 0.0),
        inset 0 -1px 2px rgba(0, 0, 0, 0.0),
        0 2px 5px rgba(0, 0, 0, 0.0);
      /* no border-top spanning full width — split into two pseudo-elements that stop at inner corners */
      transition: all 0.1s ease;
      overflow: visible;
    }
    /* Left arm — clipped top highlight + bottom shadow, both stopping at inner corner */
    .new-dpad-horizontal::before {
      content: '';
      position: absolute;
      top: 1px;
      bottom: 0;
      left: 0;
      width: 28px;
      background: linear-gradient(#d74f8e, #d74f8e) top / 100% 2px no-repeat;
      border-radius: 6px 0 0 6px;
      clip-path: inset(0 1px 0 0 round 6px 0 0 6px);
      box-shadow:
        inset 0 -2px 0 rgba(0, 0, 0, 0.88),
        0 2px 3px rgba(0, 0, 0, 0.34),
        0 5px 7px rgba(0, 0, 0, 0.22);
      pointer-events: none;
    }
    /* Right arm — clipped top highlight + bottom shadow, both stopping at inner corner */
    .new-dpad-horizontal::after {
      content: '';
      position: absolute;
      top: 1px;
      bottom: 0;
      right: 0;
      width: 28px;
      background: linear-gradient(#d74f8e, #d74f8e) top / 100% 2px no-repeat;
      border-radius: 0 6px 6px 0;
      clip-path: inset(0 0 0 1px round 0 6px 6px 0);
      box-shadow:
        inset 0 -2px 0 rgba(0, 0, 0, 0.88),
        0 2px 3px rgba(0, 0, 0, 0.34),
        0 5px 7px rgba(0, 0, 0, 0.22);
      pointer-events: none;
    }

    .new-dpad-center {
      position: absolute;
      width: 23px;
      height: 23px;
      background: radial-gradient(circle at 45% 38%, #97094482 8%, #a8043d78 100%);
      border-radius: 15px;
      top: 38px;
      left: 38px;
      z-index: 2;
      box-shadow: inset 9px 7px 9px rgba(6, 0, 7, 0.413);
    }

    /* D-pad directional triangles */
    .new-dpad-triangle-up,
    .new-dpad-triangle-down,
    .new-dpad-triangle-left,
    .new-dpad-triangle-right {
      position: absolute;
      width: 0;
      height: 0;
      z-index: 3;
    }

    .new-dpad-triangle-up {
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 10px solid rgba(0, 0, 0, 0.4);
      top: 15px;
      left: 42px;
    }

    .new-dpad-triangle-down {
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid rgba(0, 0, 0, 0.4);
      bottom: 15px;
      left: 42px;
    }

    .new-dpad-triangle-left {
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 10px solid rgba(0, 0, 0, 0.4);
      left: 15px;
      top: 42px;
    }

    .new-dpad-triangle-right {
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 10px solid rgba(0, 0, 0, 0.4);
      right: 15px;
      top: 42px;
    }

    /* D-pad button areas */
    .new-dpad-up,
    .new-dpad-down,
    .new-dpad-left,
    .new-dpad-right {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 25;
      transition: all 0.1s ease;
    }

    .new-dpad-up {
      width: 30px;
      height: 30px;
      top: 0;
      left: 35px;
    }

    .new-dpad-down {
      width: 30px;
      height: 30px;
      bottom: 0;
      left: 35px;
    }

    .new-dpad-left {
      width: 30px;
      height: 30px;
      left: 0;
      top: 35px;
    }

    .new-dpad-right {
      width: 30px;
      height: 30px;
      right: 0;
      top: 35px;
    }

    /* D-pad pressed animations */
    /* UP: top sinks */
    .new-dpad-up:active ~ .new-dpad-plus .new-dpad-vertical,
    .new-dpad-up.pressed ~ .new-dpad-plus .new-dpad-vertical {
      transform: perspective(200px) rotateX(6deg); transform-origin: center center;
    }
    .new-dpad-up:active ~ .new-dpad-plus .new-dpad-triangle-up,
    .new-dpad-up.pressed ~ .new-dpad-plus .new-dpad-triangle-up {
      transform: perspective(200px) rotateX(6deg); transform-origin: center center;
    }

    /* DOWN: bottom sinks */
    .new-dpad-down:active ~ .new-dpad-plus .new-dpad-vertical,
    .new-dpad-down.pressed ~ .new-dpad-plus .new-dpad-vertical {
      transform: perspective(200px) rotateX(-6deg); transform-origin: center center;
    }
    .new-dpad-down:active ~ .new-dpad-plus .new-dpad-triangle-down,
    .new-dpad-down.pressed ~ .new-dpad-plus .new-dpad-triangle-down {
      transform: perspective(200px) rotateX(-6deg); transform-origin: center center;
    }

    /* LEFT: left sinks */
    .new-dpad-left:active ~ .new-dpad-plus .new-dpad-horizontal,
    .new-dpad-left.pressed ~ .new-dpad-plus .new-dpad-horizontal {
      transform: perspective(200px) rotateY(-6deg); transform-origin: center center;
    }
    .new-dpad-left:active ~ .new-dpad-plus .new-dpad-triangle-left,
    .new-dpad-left.pressed ~ .new-dpad-plus .new-dpad-triangle-left {
      transform: perspective(200px) rotateY(-6deg); transform-origin: center center;
    }

    /* RIGHT: right sinks */
    .new-dpad-right:active ~ .new-dpad-plus .new-dpad-horizontal,
    .new-dpad-right.pressed ~ .new-dpad-plus .new-dpad-horizontal {
      transform: perspective(200px) rotateY(6deg); transform-origin: center center;
    }
    .new-dpad-right:active ~ .new-dpad-plus .new-dpad-triangle-right,
    .new-dpad-right.pressed ~ .new-dpad-plus .new-dpad-triangle-right {
      transform: perspective(200px) rotateY(6deg); transform-origin: center center;
    }
    /* A and B buttons - FIXED with visible container */
  .buttons-a-b {
      position: absolute;
      height: 60px;
      width: 110px;
  background: var(--stateboy-shell);
      border-radius: 30px;
      right: 20px;
      top: 50%;
      transform: translateY(-50%) rotate(-25deg);
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      box-shadow:
        inset 0 3px 16px rgba(0, 0, 0, 0.20),
        inset 0 1px 6px rgba(0, 0, 0, 0.18),
        inset 0 -2px 7px rgba(255, 255, 255, 0.06),
        var(--control-shell-glow, 0 0 0 rgba(0, 0, 0, 0));
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .button-a, .button-b {
      position: absolute;
      height: 42px;
      width: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff0080 0%, #640134 100%);
      border: none;
      cursor: pointer;
      z-index: 25;
      box-shadow: 0 4px 4px rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.1s ease;
      top: 50%;
      transform: translateY(-50%) rotate(25deg);
    }

    .button-a:active, .button-b:active {
      transform: translateY(-50%) rotate(25deg) scale(0.9);
      box-shadow: 0 2px 2px rgba(0, 0, 0, 0.8);
    }

    /* Programmatic pressed state mirrors :active for reliable touch feedback */
    .button-a.pressed, .button-b.pressed {
      transform: translateY(-50%) rotate(25deg) scale(0.9);
      box-shadow: 0 2px 2px rgba(0, 0, 0, 0.8);
    }

    .button-a {
      right: 8px;
    }

    .button-b {
      left: 8px;
    }

    /* Button labels */
    .button-a-label, .button-b-label {
      position: absolute;
      font-size: 16px !important;
      font-weight: 700 !important;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace !important;
      color: rgba(0, 0, 0, 0.6);
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.3);
      pointer-events: none;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 42px;
      height: 42px;
      top: 50%;
      /* Counter-rotate labels to remain upright despite container tilt */

    function initBatteryMonitoring() {
      const batteryLight = document.querySelector('.battery-light');
      if (!batteryLight) {
        console.warn('Battery light element not found - skipping battery monitoring');
        return;
      }
      
      if ('getBattery' in navigator) {
        // Modern Battery API
        navigator.getBattery().then(function(battery) {
          updateBatteryDisplay(battery, batteryLight);
          
          // Listen for battery events
          battery.addEventListener('chargingchange', () => updateBatteryDisplay(battery, batteryLight));
          battery.addEventListener('levelchange', () => updateBatteryDisplay(battery, batteryLight));

          // Fallback to charging detection

        fallbackChargingDetection(batteryLight);
      }
    }
    
    function updateBatteryDisplay(battery, batteryLight) {
      // Remove all battery classes
      batteryLight.classList.remove('charging', 'full', 'medium', 'low');
      const lightSpan = batteryLight.querySelector('span');
      if (!lightSpan) return;
      function setLedGlow(color, glow) {
        lightSpan.style.background = color;
        lightSpan.style.boxShadow = '0 0 4px ' + glow + ', 0 0 8px ' + glow + ', 0 0 14px ' + glow;
        lightSpan.style.transform = 'scale(1.02)';
      }
      lightSpan.style.background = '#222';
      lightSpan.style.boxShadow = '0 0 3px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.18)';
      lightSpan.style.transform = 'scale(1)';
      if (battery.charging) {
        batteryLight.classList.add('charging');
        // Charging animation handles both color and glow via keyframes.
        lightSpan.style.background = '';
        lightSpan.style.boxShadow = '';
        lightSpan.style.transform = 'scale(1.04)';
        console.log('Battery charging - showing animation');
      } else {
        if (battery.level > 0.8) {
          batteryLight.classList.add('full');
          setLedGlow('#44ffe3', 'rgba(68,255,227,.78)');
        } else if (battery.level > 0.3) {
          batteryLight.classList.add('medium');
          setLedGlow('#ff00ea', 'rgba(255,0,234,.72)');
        } else {
          batteryLight.classList.add('low');
          setLedGlow('#ffe344', 'rgba(255,227,68,.78)');
        }
        console.log(`Battery level: ${Math.round(battery.level * 100)}%`);
      }
    }

    function fallbackChargingDetection(batteryLight) {
      if (!batteryLight) {
        console.warn('Battery light element not available for fallback detection');
        return;
      }
      // Fallback method using connection API and periodic checks
      let lastKnownCharging = false;
      
      function checkCharging() {
        if (!batteryLight) return;
        const lightSpan = batteryLight.querySelector('span');
        batteryLight.classList.remove('charging', 'full', 'medium', 'low');
        if (lightSpan) {
          lightSpan.style.background = '#222';
          lightSpan.style.boxShadow = '0 0 3px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.18)';
          lightSpan.style.transform = 'scale(1)';
        }
        // Default to full battery (green) when we can't detect
        batteryLight.classList.add('full');
        if (lightSpan) {
          lightSpan.style.background = '#44ffe3';
          lightSpan.style.boxShadow = '0 0 4px rgba(68,255,227,.78), 0 0 8px rgba(68,255,227,.78), 0 0 14px rgba(68,255,227,.48)';
          lightSpan.style.transform = 'scale(1.02)';

        if (window.DSMBridge && window.DSMBridge.getBatteryStatus) {

            }
          } catch (e) {
            console.log('Native battery status not available');
          }
        }
      }
      
      // Perform a single check on load; avoid periodic timers for strict determinism.
      checkCharging();

  <script>
    (function () {
      var themes = [
        { key: 'default', label: 'DEFAULT' },
        { key: 'smoke',  label: 'SMOKE'  },
        { key: 'purple', label: 'PURPLE' },
        { key: 'violet', label: 'VIOLET' },
        { key: 'red',    label: 'RED'    },
        { key: 'sunburst', label: 'SUNBURST' },
        { key: 'white',  label: 'WHITE'  },
        { key: 'blue',   label: 'BLUE'   },
        { key: 'pink',   label: 'PINK'   },
        { key: 'bitcoin', label: 'BITCOIN' },
        { key: 'dmg',    label: 'DMG-01' }
      ];
      var current = 0;
      var holdTimer = null;
      var HOLD_MS = 600;
      var flash = document.getElementById('theme-flash');
      var flashTimer = null;

      function applyTheme(idx) {
        var t = themes[idx];
        if (t.key === 'default') {
          document.documentElement.removeAttribute('data-shell-theme');
        } else {
          document.documentElement.setAttribute('data-shell-theme', t.key);
        }
        syncShellThemeAssets();
        if (flash) {
          flash.textContent = t.label;
          flash.style.opacity = '1';
          clearTimeout(flashTimer);
          flashTimer = setTimeout(function () { flash.style.opacity = '0'; }, 1200);
        }
        try { localStorage.setItem('dsm-shell-theme', String(idx)); } catch(e) {}
        window.dispatchEvent(new CustomEvent('dsm-shell-theme-changed'));
      }

      function cycleTheme() {
        current = (current + 1) % themes.length;
        applyTheme(current);
      }

      function onHoldStart(e) {
        holdTimer = setTimeout(function () {
          holdTimer = null;
          cycleTheme();
        }, HOLD_MS);
      }

      function onHoldEnd(e) {
        clearTimeout(holdTimer);
        holdTimer = null;
      }

      function init() {
        try {
          var saved = parseInt(localStorage.getItem('dsm-shell-theme'), 10);
          if (!isNaN(saved) && saved >= 0 && saved < themes.length) {
            current = saved;
            applyTheme(current);
          }
        } catch(e) {}

        syncShellThemeAssets();

        var sel = document.getElementById('button-select');
        if (!sel) return;
        sel.addEventListener('mousedown',   onHoldStart);
        sel.addEventListener('mouseup',     onHoldEnd);
        sel.addEventListener('mouseleave',  onHoldEnd);
        sel.addEventListener('touchstart',  onHoldStart, { passive: true });
        sel.addEventListener('touchend',    onHoldEnd,   { passive: true });
        sel.addEventListener('touchcancel', onHoldEnd,   { passive: true });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>

  <script>
    (function(){
      // Event-driven MessagePort bridge setup for Android WebView
      // This runs in the same context as React, ensuring window.DsmBridge is accessible
      if (window.DsmBridge && window.DsmBridge.__binary) return; // Already installed
      
      let port = null;
      window.__DSM_EVENT_BUFFER__ = [];
      try { console.log('[DSM] Waiting for MessagePort from Android...'); } catch (_) {}
      
      function ensurePort() {
        if (!port) throw new Error('DSM binary bridge not ready');
        return port;
      }
      
      function encodeVarint32(n) {
        const out = [];
        let v = n >>> 0;
        while (v >= 0x80) {
          out.push((v & 0x7f) | 0x80);
          v >>>= 7;
        }
        out.push(v);
        return new Uint8Array(out);
      }

      function encodeLengthDelimited(tag, bytes) {
        const len = encodeVarint32(bytes.length);
        const out = new Uint8Array(1 + len.length + bytes.length);
        out[0] = tag;
        out.set(len, 1);
        out.set(bytes, 1 + len.length);
        return out;
      }

      function encodeBridgeRequest(method, payload) {
        const enc = new TextEncoder();
        const m = enc.encode(method);
        const p = payload instanceof Uint8Array ? payload : new Uint8Array(0);

        const methodField = encodeLengthDelimited(0x0A, m); // field 1

        if (!p || p.length === 0) {
          // EmptyPayload field 2 (length 0)
          const empty = new Uint8Array([0x12, 0x00]);
          const out = new Uint8Array(methodField.length + empty.length);
          out.set(methodField, 0);
          out.set(empty, methodField.length);
          return out;
        }

        // BytesPayload: message { bytes data = 1 }
        const bytesPayload = encodeLengthDelimited(0x0A, p);
        const payloadField = encodeLengthDelimited(0x1A, bytesPayload); // field 3
        const out = new Uint8Array(methodField.length + payloadField.length);
        out.set(methodField, 0);
        out.set(payloadField, methodField.length);
        return out;
      }
      
      const TAG_RESPONSE = 0x01;

      function readVarint(buf, start) {
        let shift = 0;
        let result = 0;
        let off = start;
        while (off < buf.length) {
          const b = buf[off++] & 0xff;
          result |= (b & 0x7f) << shift;
          if ((b & 0x80) === 0) return { value: result >>> 0, off };
          shift += 7;
          if (shift > 35) return null;
        }
        return null;
      }

      function readLenDelimited(buf, start) {
        const v = readVarint(buf, start);
        if (!v) return null;
        const len = v.value >>> 0;
        const end = v.off + len;
        if (end > buf.length) return null;
        return { bytes: buf.slice(v.off, end), off: end };
      }

      function dispatchEventPayload(bytes) {
        let off = 0;
        let topic = '';
        let payload = new Uint8Array(0);
        while (off < bytes.length) {
          const k = readVarint(bytes, off);
          if (!k) return false;
          off = k.off;
          const field = k.value >>> 3;
          const wire = k.value & 0x07;
          if (wire !== 2) return false;
          const ld = readLenDelimited(bytes, off);
          if (!ld) return false;
          off = ld.off;
          if (field === 1) {
            topic = new TextDecoder().decode(ld.bytes);
          } else if (field === 2) {
            payload = ld.bytes;
          }
        }
        if (!topic) return false;
        if (window.__DSM_EVENT_BUFFER__) {
          window.__DSM_EVENT_BUFFER__.push({ topic, payload });
        }
        try {
          window.dispatchEvent(new CustomEvent('dsm-event-bin', { detail: { topic, payload } }));
        } catch (_) {}
        return true;
      }
      
      // ============================================================================
      // DETERMINISTIC MESSAGE-PORT BRIDGE (BigInt counter + ID-based routing)
      // ============================================================================
      let nextMsgId = 1n; // Monotonic BigInt counter (deterministic, no Math.random())
      const pending = new Map(); // Map<bigint, {resolve, reject, timeout}>

      // Single shared MessagePort onmessage handler (ID-based routing)
      function installPortHandler(p) {
        p.onmessage = (e) => {
          try {
            let bytes;
            const data = e.data;
            
            // Extract bytes from event (support multiple shapes)
            if (data && data.data instanceof ArrayBuffer) {
              bytes = new Uint8Array(data.data);
            } else if (data && data.data instanceof Uint8Array) {
              bytes = data.data;
            } else if (data instanceof ArrayBuffer) {
              bytes = new Uint8Array(data);
            } else if (data instanceof Uint8Array) {
              bytes = data;
            } else {
              return;
            }
            if (!bytes || bytes.length < 1) return;
            
            // Canonical async event payload is protobuf AppRouterPayload(method_name, args)
            // and does not carry an 8-byte request id prefix.
            if (bytes.length > 0 && bytes.length < 8) {
              dispatchEventPayload(bytes);
              return;
            }

            // Heuristic: non-response messages without pending id are treated as event payloads.
            const idViewMaybe = bytes.length >= 8 ? new DataView(bytes.buffer, bytes.byteOffset, 8) : null;
            if (idViewMaybe) {
              const hiMaybe = idViewMaybe.getUint32(0, false);
              const loMaybe = idViewMaybe.getUint32(4, false);
              const maybeId = (BigInt(hiMaybe) << 32n) | BigInt(loMaybe);
              if (!pending.has(maybeId) && dispatchEventPayload(bytes)) {
                return;
              }
            }
            
            if (bytes.length < 8) return;
            
            // First 8 bytes are big-endian u64 message id (BigInt)
            const idView = new DataView(bytes.buffer, bytes.byteOffset, 8);
            const hi = idView.getUint32(0, false); // big-endian high 32 bits
            const lo = idView.getUint32(4, false); // big-endian low 32 bits
            const respId = (BigInt(hi) << 32n) | BigInt(lo);
            
            // Lookup pending request by ID
            const state = pending.get(respId);
            if (!state) {
              console.warn('[Bridge] Received response for unknown id:', respId.toString());
              return;
            }
            
            // Strip 8-byte id prefix for payload processing
            const payload = bytes.slice(8);
            
            // Resolve and clean up
            clearTimeout(state.timeout);
            pending.delete(respId);
            state.resolve(payload);
          } catch (err) {
            console.error('[Bridge] onmessage error:', err);
            // Clean up the pending entry if we identified the respId before the error
            if (typeof respId !== 'undefined') {
              const orphan = pending.get(respId);
              if (orphan) {
                clearTimeout(orphan.timeout);
                pending.delete(respId);
                orphan.reject(err instanceof Error ? err : new Error(String(err)));
              }
            }
          }
        };
        p.start && p.start();
        console.log('[Bridge] Deterministic handler installed (BigInt counter)');
      }
      
      async function sendMessageBin(requestBytes) {
        const p = ensurePort();
        
        // Install shared handler if first call
        if (!p.onmessage) {
          installPortHandler(p);
        }
        
        const msg = requestBytes instanceof Uint8Array ? requestBytes : new Uint8Array(0);
        const id = nextMsgId++; // Monotonic BigInt counter (deterministic)
        
        return new Promise((resolve, reject) => {
          // Create timeout with proper cleanup
          const timeout = setTimeout(() => {
            pending.delete(id);
            console.warn('[Bridge] Timeout for id:', id.toString());
            reject(new Error(`Bridge timeout (id=${id})`));
          }, 120000);

          // Register pending state (ID-based routing)
          pending.set(id, { resolve, reject, timeout });

          // Post ArrayBuffer (bytes-only) prefixed with 8-byte big-endian u64 id
          const msgWithId = new Uint8Array(8 + msg.length);
          const v = new DataView(msgWithId.buffer);
          const hi = Number(id >> 32n); // high 32 bits
          const lo = Number(id & 0xFFFFFFFFn); // low 32 bits
          v.setUint32(0, hi, false); // big-endian
          v.setUint32(4, lo, false); // big-endian
          msgWithId.set(msg, 8);

          p.postMessage(msgWithId.buffer, [msgWithId.buffer]);
        });
      }

      // Async wrapper for hasIdentityDirect (calls through binary bridge)
      async function hasIdentityDirect() {
        if (!port) return false;
        try {
          const req = encodeBridgeRequest('hasIdentityDirect', new Uint8Array(0));
          const response = await sendMessageBin(req);
          // Response is a single byte: 1 for true, 0 for false
          return response.length > 0 && response[0] === 1;
        } catch (err) {
          console.error('[DSM] hasIdentityDirect error:', err);
          return false;
        }
      }
      
      // Expose bridge interface immediately (even before port arrives)
      window.DsmBridge = {
        __binary: true,
        isAvailable: () => !!port,
        sendMessageBin,
        getBridgeStatus: () => (port ? 3 : 0),
        hasIdentityDirect,
      };
      
      try { console.log('[DSM] Bridge interface installed, waiting for port...'); } catch (_) {}
      
      // Listen for MessagePort from Android
      window.addEventListener('message', (ev) => {
        if (ev.ports && ev.ports[0]) {
          port = ev.ports[0];
          installPortHandler(port);
          window.dispatchEvent(new Event('dsm-bridge-ready'));
        }
      });
    })();
  </script>
