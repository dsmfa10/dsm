SPECIFICATION Spec

\* System interleavings mode (no phase harness gating)
\* Keep the same safety/refinement checks, but explore wider Next choices.

CONSTANT
    DeviceIds = {d1, d2}
    GenesisIds = {g1}
    MaxDevices = 2
    MaxPayload = 1
    VaultIds = {v1}
    MaxVaults = 1
    ShardDepth = 1
    MaxEmissions = 1
    EmissionAmount = 1
    MaxSupply = 1
    MaxNet = 1
    MaxDupPerMsg = 0
    MaxStep = 5
    UseHarness = FALSE

INVARIANT
    TypeInvariant
    NoDuplicateDevices
    ActiveRelationshipsSymmetric
    VaultsOwnedByCreator
    OfflineSessionsSymmetric
    DJTESafety
    ConcreteRefinesAbstract
    RefinementStrengthening
    SourceVaultBounded
    TripwireInvariant

\* ConcreteRefinesAbstract is a state predicate; keep it as an INVARIANT so
\* TLC checks it in all reachable states (not only the initial state).

PROPERTY
    SpentJapsNeverShrink
    CommitNeverDecreasesConcrete
    SourceRemainingNeverIncreases

CONSTRAINT
    StepBound
