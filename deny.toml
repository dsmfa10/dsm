# deny.toml — DSM Cargo Deny Policy (Strict Mode)

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = [
    # Legacy transitive support crates still pinned by upstream libraries.
    { crate = "heck@0.4.1", reason = "legacy codegen stack retained by prost/cbindgen toolchain split" },
    { crate = "http@0.2.12", reason = "legacy hyper 0.14 branch retained by external dependencies" },
    { crate = "http-body@0.4.6", reason = "legacy hyper 0.14 branch retained by external dependencies" },
    { crate = "hyper@0.14.32", reason = "legacy hyper stack retained by metrics exporter and test-only paths" },
    { crate = "indexmap@1.9.3", reason = "older map implementation retained by legacy transitive dependencies" },
    { crate = "itertools@0.14.0", reason = "tooling-only prost 0.13 codegen branch retained by dsm-gen and tonic-build" },
    { crate = "num-bigint@0.2.6", reason = "legacy big integer branch pinned by num-primes" },
    { crate = "petgraph@0.7.1", reason = "tooling-only prost 0.13 codegen branch retained by dsm-gen and tonic-build" },
    { crate = "prost@0.13.5", reason = "tooling-only prost branch retained by dsm-gen and tonic-build" },
    { crate = "prost-build@0.13.5", reason = "tooling-only prost branch retained by dsm-gen and tonic-build" },
    { crate = "prost-derive@0.13.5", reason = "tooling-only prost branch retained by dsm-gen and tonic-build" },
    { crate = "prost-types@0.13.5", reason = "tooling-only prost branch retained by dsm-gen and tonic-build" },
    { crate = "r-efi@5.3.0", reason = "legacy EFI support crate retained by older getrandom consumers" },
    { crate = "rand@0.5.6", reason = "legacy RNG branch pinned by num-primes" },
    { crate = "rand@0.9.2", reason = "transitive RNG branch retained by postgres/proptest ecosystem" },
    { crate = "rand_core@0.3.1", reason = "legacy RNG core retained by rand 0.5" },
    { crate = "rand_core@0.4.2", reason = "legacy RNG core retained by rand 0.5 compatibility layer" },
    { crate = "rand_core@0.9.5", reason = "transitive RNG core retained by postgres/proptest ecosystem" },
    { crate = "socket2@0.5.10", reason = "transitive legacy hyper branch; runtime graph already prefers socket2 0.6" },
    { crate = "thiserror@1.0.69", reason = "transitive legacy error stack from external crates not yet on thiserror 2" },
    { crate = "thiserror-impl@1.0.69", reason = "proc-macro companion to transitive legacy thiserror 1" },
    { crate = "wasi@0.11.1+wasi-snapshot-preview1", reason = "transitive WASI support crate retained by older getrandom consumers" },

    { crate = "windows-sys@0.52.0", reason = "transitive target support crate via upstream Windows compatibility branches" },
]

# NOTE: Avoid overly broad bans here.
# If you want to enforce "no serde/json/base64/etc" in *specific crates or paths*,
# do it with crate-level lints, feature flags, or workspace policy checks.
# Cargo-deny bans are global (including transitive deps) and will cause noisy failures.
deny = [
    # pqcrypto umbrella crate removed in favour of pure-Rust ml-kem + custom SPHINCS+.
    # Ban prevents accidental re-introduction (C-compiled, caused SIGILL on ARM).
    { name = "pqcrypto" },
    { name = "pqcrypto-mlkem" },
    { name = "pqcrypto-sphincsplus" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
# Keep this allow-list tight, but include permissive licenses that appear in
# common Rust dependencies used across the workspace.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
]

# Build-time tooling sometimes pulls in additional licenses (e.g., cbindgen via build.rs).
# We treat those as exceptions rather than expanding the global allow list too far.
exceptions = [
    { allow = ["MPL-2.0"], name = "cbindgen" },
    # Transitive via dirs/dirs-sys.
    { allow = ["MPL-2.0"], name = "option-ext" },
    # Root CA bundle crates; licenses vary by major version.
    { allow = ["MPL-2.0", "CDLA-Permissive-2.0"], name = "webpki-roots" },
    # Used transitively by tokio-postgres-rustls.
    { allow = ["MPL-2.0"], name = "x509-certificate" },
    # Pulled transitively by bitcoin; acceptable for current release train.
    { allow = ["MITNFA"], name = "hex_lit" },
]

# Crates whose manifests lack a license field but ship a LICENSE file.
[[licenses.clarify]]
name = "fuchsia-cprng"
expression = "BSD-3-Clause"
license-files = [{ path = "LICENSE", hash = 0xa9ee426b }]

[advisories]
yanked = "deny"

# We fail the build only on vulnerabilities. Unmaintained crates are tracked here
# so cargo-deny can remain strict without blocking development.
ignore = [
    # Transitive; rustls recommends migrating to rustls-pki-types PEM APIs.
    "RUSTSEC-2025-0134", # rustls-pemfile: unmaintained

    # Bincode is frozen/unmaintained upstream, but current usage is intentional
    # and tracked for future migration.
    "RUSTSEC-2025-0141", # bincode: unmaintained

    # Used only in vertical validation tooling for operational timing.
    "RUSTSEC-2024-0384", # instant: unmaintained
]
