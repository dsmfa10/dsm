}

// ===================== SDK INIT / STATUS =====================
// Returned when the app attempts to mark the SDK/wallet "initialized" but a
// mandatory prerequisite is missing (e.g., C-DBRW not bootstrapped yet).
message InitFailed {
  enum Reason {
    REASON_UNSPECIFIED = 0;
    CDBRW_NOT_READY = 1;
    PLATFORM_CONTEXT_MISSING = 2;
    INVALID_INPUT = 3;
  }
  Reason reason = 1;
  string message = 2;
}

// ============ RECOVERY OPERATIONS (binary IDs) ==============

message ThermalStateProto {
  string health = 1;
  int32 status_code = 2;
  string description = 3;
  string recommendation = 4;
}
message ArchitectureInfoProto {
  string status = 1;
  string device_arch = 2;
  string supported_abis = 3;
  string message = 4;
  string recommendation = 5;
}
message RecoveryCapsuleDecryptRequest { bytes encrypted_capsule = 1 [(dsm_max_len)=4096]; bytes mnemonic_key = 2 [(dsm_fixed_len)=32]; }
message RecoveryCapsuleDecryptResponse{
  bool   success          = 1;
  Hash32 global_root      = 2;
  repeated ChainTip chain_tips = 3;
  Hash32 receipt_rollup   = 4;
  bytes  meta_data        = 5 [(dsm_max_len)=256]; // version/flags/counters only
}
message SmtLeaf     { uint64 index = 1; Hash32 value = 2; }
message SmtSnapshot { uint32 height = 1; uint64 leaf_count = 2; repeated SmtLeaf leaves = 3; }
message PersistedRelationshipState {
  bytes  device_id = 1 [(dsm_fixed_len)=32];
  SmtSnapshot tree_snapshot = 2;
  Hash32 last_head = 3;
  uint64 local_counter_confirmed = 4;
  uint64 pending_counter = 5; // 0 == none
  uint64 remote_counter_confirmed = 6;
}
message ReceiptGuardSnapshotProto { uint64 capacity = 1; repeated uint64 sequence = 2; }
message PersistedOfflineState { uint32 version = 1; repeated PersistedRelationshipState relationships = 2; ReceiptGuardSnapshotProto guard_snapshot = 3; }
message ChainTip { bytes counterparty_device_id = 1 [(dsm_fixed_len)=32]; uint64 height = 2; Hash32 head_hash = 3; }
message RecoveryTombstoneRequest { Hash32 global_root = 1; uint64 counter = 2; Hash32 rollup_hash = 3; bytes device_entropy = 4 [(dsm_max_len)=4096]; bytes environment_data = 5 [(dsm_max_len)=4096]; }
message RecoveryTombstoneResponse{ bool success = 1; Hash32 tombstone_hash = 2; bytes tombstone_receipt = 3 [(dsm_max_len)=4096]; }
message RecoverySuccessionRequest { Hash32 tombstone_hash = 1; bytes device_entropy = 2 [(dsm_max_len)=4096]; bytes environment_data = 3 [(dsm_max_len)=4096]; }
message RecoverySuccessionResponse{ bool success = 1; Hash32 succession_hash = 2; bytes succession_receipt = 3 [(dsm_max_len)=4096]; Hash32 new_genesis_hash = 4; }
message RecoveryResumeRequest  { bytes counterparty_device_id = 1 [(dsm_fixed_len)=32]; Hash32 last_head_hash = 2; uint64 last_height = 3; }
message RecoveryResumeResponse { bool success = 1; Hash32 new_transaction_hash = 2; bytes transaction_receipt = 3 [(dsm_max_len)=4096]; }

// ==================== Minimal deterministic identity =================
message ContactQrV3 {
  bytes  device_id       = 1 [(dsm_fixed_len)=32]; // raw 32-byte device identifier
  string network         = 2; // e.g. "main" | "test"
  // Replace single CSV storage_hint with an explicit
  // repeated list of storage node endpoints. A minimum of 3 MUST be supplied
  // to allow multi-node online genesis hash verification.
  repeated string storage_nodes = 3; // e.g. ["http://host:8080", "http://host:8081", ...]
  bytes  sdk_fingerprint = 4 [(dsm_fixed_len)=32];
  bytes  genesis_hash    = 5 [(dsm_fixed_len)=32]; // raw 32-byte genesis hash
  bytes  signing_public_key = 6 [(dsm_fixed_len)=64]; // SPHINCS+ SPX256s public key for bilateral verification
  string preferred_alias = 7; // Optional user-chosen alias; backend uses this if non-empty, otherwise generates from device_id
}

message ContactManualAddRequest {
  string alias = 1;
  bytes  device_id = 2 [(dsm_fixed_len)=32];
  bytes  genesis_hash = 3 [(dsm_fixed_len)=32];
  bytes  signing_public_key = 4 [(dsm_fixed_len)=64];
}

// ==================== Contacts (canonical results) ==================
message ContactAddResponse {
  string alias = 1;
  bytes  device_id = 2 [(dsm_fixed_len)=32];
  Hash32 genesis_hash = 3;
  optional Hash32 chain_tip = 4;
  optional SmtProof chain_tip_smt_proof = 5;
  optional bytes alias_binding = 6 [(dsm_max_len)=4096];
  bool   genesis_verified_online = 7;
  uint64 verify_counter          = 8; // deterministic counter (no time)
  uint64 added_counter           = 9; // deterministic counter (no time)
  repeated string verifying_storage_nodes = 10;
  string ble_address = 11; // BLE MAC address for offline bilateral transfers
  bytes  signing_public_key = 12 [(dsm_fixed_len)=64]; // SPHINCS+ SPX256s public key for bilateral verification
}

// ======================== Faucet Operations =========================
message FaucetClaimRequest  { bytes device_id = 1 [(dsm_fixed_len)=32]; }
message FaucetClaimResponse { bool success = 1; uint64 tokens_received = 2; uint64 next_available_index = 3; string message = 4; }

// ======================= Online Transfer Messages ====================
message OnlineTransferRequest {
  string token_id = 1;
  bytes to_device_id = 2 [(dsm_fixed_len)=32];
  uint64 amount = 3;
  string memo = 4;
  bytes signature = 5 [(dsm_max_len)=65535]; // optional sender signature (crypto proof)
  // Deterministic 32-byte nonce signed by sender to prevent replays (AF-2)
  bytes nonce = 6 [(dsm_fixed_len)=32];
  // Envelope v3 signing context (AF-2 remediation)
  bytes from_device_id = 7 [(dsm_fixed_len)=32]; // REQUIRED: sender identity for key selection
  bytes chain_tip = 8 [(dsm_fixed_len)=32]; // RESERVED/IGNORED: SDK derives bilateral tip from SQLite; frontend must never supply this
  uint64 seq = 9; // REQUIRED: deterministic sequence counter
  // §4.2 ReceiptCommit canonical protobuf bytes — SMT proofs for this transition
  bytes receipt_commit = 10 [(dsm_max_len)=131072];
}

message OnlineTransferSmartRequest {
  string recipient = 1; // Alias or Base32 ID
  string amount = 2; // Decimal string
  string token_id = 3;
  string memo = 4;
}

message OnlineTransferResponse {
  bool success = 1;
  Hash32 transaction_hash = 2;
  string message = 3;
  uint64 new_balance = 4;
}

// ======================= Online Message Messages ====================
message OnlineMessageRequest {
  bytes to_device_id = 1 [(dsm_fixed_len)=32];
  bytes payload = 2 [(dsm_max_len)=4096];
  string memo = 3;
  bytes signature = 4; // optional sender signature
  bytes nonce = 5 [(dsm_fixed_len)=32];
  bytes from_device_id = 6 [(dsm_fixed_len)=32];
  bytes chain_tip = 7 [(dsm_fixed_len)=32];
  uint64 seq = 8; // deterministic sequence counter
}

message OnlineMessageResponse {
  bool success = 1;
  string message = 2;
  bytes message_id = 3 [(dsm_fixed_len)=16];
}

// =================== Discovery / Publish Diagnostics =================
message DiscoverLocalResponse { repeated string discovered_nodes = 1; string discovery_method = 2; uint64 event_counter = 3; }
message PublishGenesisResponse { bool success = 1; bool published = 2; string key = 3; uint32 published_to_nodes = 4; uint64 event_counter = 5; }

message TokenPolicyCacheEntry {
  bytes  policy_commit = 1 [(dsm_fixed_len)=32];
  bytes  policy_bytes  = 2 [(dsm_max_len)=131072];
  string ticker        = 3;
  string alias         = 4;
  uint32 decimals      = 5;
  string max_supply    = 6;
}

message TokenPolicyListResponse { repeated TokenPolicyCacheEntry policies = 1; }

// ======================= Query Result Messages ======================
message BalanceGetResponse {
  string token_id = 1;
  uint64 available = 2;
  uint64 locked = 3;
  string symbol = 4;
  uint32 decimals = 5;
  string token_name = 6;
}
// Multi-token enumeration (ordered lexicographically by token_id on server side)
message BalancesListResponse { repeated BalanceGetResponse balances = 1; }
message TransactionInfo {
  string id            = 1;
  bytes  from_device_id= 2 [(dsm_fixed_len)=32];
  bytes  to_device_id  = 3 [(dsm_fixed_len)=32];
  string token_id      = 4;
  uint64 amount        = 5;
  uint64 fee           = 6;
  uint64 logical_index = 7; // device-local counter
  bytes  tx_hash       = 8 [(dsm_fixed_len)=32];
  sint64 amount_signed = 9; // signed amount for DLV/faucet: positive=incoming, negative=outgoing
  TransactionType tx_type = 10; // enumerated transaction type
  string status        = 11; // "completed", "confirmed", "pending", etc.
  string recipient     = 12; // alias or device ID text for UI display
  bytes  stitched_receipt = 13 [(dsm_max_len)=131072]; // canonical stitched receipt bytes (if available)
  uint64 created_at = 14; // DISPLAY-ONLY: unix timestamp (seconds) for UI history ordering. MUST NOT be used in hash preimages, ReceiptCommit fields, acceptance predicates, or protocol ordering.
  string memo = 15; // optional memo/note
  bool   receipt_verified = 16; // true iff stitched_receipt passes cryptographic verification (SMT roots, tripwire, proofs)
}
message WalletHistoryResponse { repeated TransactionInfo transactions = 1; }
message ContactsListResponse  { repeated ContactAddResponse contacts = 1; }

// ========================= Geo Emissions (transport only) =========================
// Transport messages for clockless geo-claim submission and acknowledgment.
// Verification (spawn proof, C-DBRW witness, SPHINCS+ signature over canonical bytes)
// is implemented in the Rust core; these are I/O envelopes only.
message MerkleInclusionProof {
  Hash32 root         = 1; // 32B Merkle root
  repeated bytes siblings = 2 [(dsm_fixed_len)=32]; // ordered root→leaf or leaf→root per implementation; see verifier notes
  uint32 leaf_index   = 3; // zero-based index of leaf
}

// ========================= B0x Inbox =========================
message InboxItem {
  string id              = 1;
  string preview         = 2;
  uint64 tick            = 3; // deterministic counter (transport only)
  optional string sender_id = 4;
  bytes  payload         = 5;
  bool   is_stale_route  = 6; // arrived via previous (non-current) relationship tip
}
message InboxRequest {
  uint32 limit           = 1; // max items to retrieve (0 = use default)
  string chain_tip       = 2; // optional: filter by chain tip
}
message InboxResponse { repeated InboxItem items = 1; }

// ========================= Storage Sync =========================
message StorageSyncRequest {
  bool pull_inbox        = 1; // retrieve pending items from b0x
  bool push_pending      = 2; // submit local pending transactions
  uint32 limit           = 3; // max inbox items to pull (0 = default 100)
}
message StorageSyncResponse {
  bool   success         = 1;
  uint32 pulled          = 2; // items pulled from inbox
  uint32 processed       = 3; // items successfully processed
  uint32 pushed          = 4; // transactions pushed to storage
  repeated string errors = 5; // any errors encountered
}

// ========================= Canonical Proofs =========================
message SmtPathLeaf { bytes key = 1 [(dsm_fixed_len)=32]; bytes value = 2 [(dsm_fixed_len)=32]; }
message SmtProof {
  bytes key = 1 [(dsm_fixed_len)=32];
  oneof v_path {
    SmtPathLeaf existing_leaf = 2;
    bool absent = 3;
  }
  repeated bytes siblings = 4 [(dsm_fixed_len)=32]; // root→leaf, MSB-first
}

message DeviceTreeProof {
  repeated bytes siblings = 1 [(dsm_fixed_len)=32];
  bool leaf_to_root = 2;
  uint32 path_bits_len = 3; // number of bits in path_bits
  bytes path_bits = 4 [(dsm_max_len)=2048]; // packed LSB-first bitfield
}

// ========================= Device Tree =========================
message DeviceTreeEntry {
  bytes device_id = 1 [(dsm_fixed_len)=32];
  bytes genesis_hash = 2 [(dsm_fixed_len)=32];
  bytes parent_hash = 3 [(dsm_fixed_len)=32];
  uint32 tree_depth = 4;
  repeated bytes merkle_proof = 5 [(dsm_fixed_len)=32];
}

// ========================= Storage Object Messages =========================
// Protobuf-based storage object submission (no hex, no headers)
message StorageObjectPut {
  bytes dlv_id = 1 [(dsm_fixed_len)=32]; // 32-byte DLV identifier (raw bytes)
  string path = 2; // object path within DLV
  bytes payload = 3; // object data (raw bytes)
  reserved 4; // retention field removed (clockless)
}

message StorageObjectPutResponse {
  bool success = 1;
  string message = 2;
  bytes object_key = 3; // computed storage key
}

message StorageObjectGet {
  bytes dlv_id = 1 [(dsm_fixed_len)=32]; // 32-byte DLV identifier (raw bytes)
  string path = 2; // object path within DLV
}

message StorageObjectGetResponse {
  bool success = 1;
  bytes payload = 2; // object data (raw bytes)
  string message = 3;
}

message StorageObjectDelete {
  bytes dlv_id = 1 [(dsm_fixed_len)=32]; // 32-byte DLV identifier (raw bytes)
  string path = 2; // object path within DLV
}

message StorageObjectDeleteResponse {
  bool success = 1;
  string message = 2;
}

// ========================= Storage Status =========================
message StorageStatusRequest {
  // No params needed for now
}

message StorageStatusResponse {
  uint32 total_nodes = 1;
  uint32 connected_nodes = 2;
  uint64 last_sync_iter = 3; // deterministic sync counter
  string data_size = 4;
  string backup_status = 5;
}

// ========================= C-DBRW Status =========================
message DbrwStatusResponse {
  bool enrolled = 1;
  bool binding_key_present = 2;
  bool verifier_keypair_present = 3;
  bool storage_base_dir_set = 4;
  bool observe_only = 5;
  string access_mode = 6;
  uint32 enrollment_revision = 7;
  uint32 arena_bytes = 8;
  uint32 probes = 9;
  uint32 steps_per_probe = 10;
  uint32 histogram_bins = 11;
  uint32 rotation_bits = 12;
  float epsilon_intra = 13;
  uint32 mean_histogram_len = 14;
  bytes reference_anchor_prefix = 15 [(dsm_max_len)=16];
  bytes binding_key_prefix = 16 [(dsm_max_len)=16];
  bytes verifier_public_key_prefix = 17 [(dsm_max_len)=16];
  uint32 verifier_public_key_len = 18;
  string storage_base_dir = 19;
  string status_note = 20;
  bool runtime_metrics_present = 21;
  string runtime_access_level = 22;
  float runtime_trust_score = 23;
  bool runtime_health_check_ran = 24;
  bool runtime_health_check_passed = 25;
  float runtime_h_hat = 26;
  float runtime_rho_hat = 27;
  float runtime_l_hat = 28;
  float runtime_match_score = 29;
  float runtime_w1_distance = 30;
  float runtime_w1_threshold = 31;
  bytes runtime_anchor_prefix = 32 [(dsm_max_len)=16];
  string runtime_error = 33;

  // Derived C-DBRW resonant health metrics (§4.5.4, §4.6, §8.1 of C-DBRW spec)
  // Computed in SDK from raw hHat/rhoHat/lHat — not in the Android binary snapshot.
  float runtime_h0_eff = 34; // Effective entropy rate: hHat * (1 - |rhoHat|) per Prop 4.23
  uint32 runtime_recommended_n = 35; // Recommended orbit length for current entropy rate
  string runtime_resonant_status = 36; // PASS | RESONANT | ADAPTED | FAIL per tri-layer §7
}

// ========================= Storage Node Stats =========================
// Per-node health and Prometheus metrics (display-only operational data)
message StorageNodeStatsRequest {
  repeated string endpoints = 1; // if empty, use all configured endpoints
}

message StorageNodeStats {
  string url = 1;
  string name = 2; // human-readable label (e.g. "dsm-node-1")
  string region = 3; // geographic region (e.g. "us-east-1")
  string status = 4; // "healthy" | "degraded" | "down"
  uint32 latency_ms = 5; // display-only round-trip time
  string last_error = 6;
  uint64 objects_put_total = 7;
  uint64 objects_get_total = 8;
  uint64 bytes_written_total = 9;
  uint64 bytes_read_total = 10;
  uint64 cleanup_runs_total = 11;
  uint64 replication_failures = 12;
}

message StorageNodeStatsResponse {
  repeated StorageNodeStats nodes = 1;
  uint32 total_nodes = 2;
  uint32 healthy_nodes = 3;
}

// Storage node management (add/remove)
message StorageNodeManageRequest {
  string action = 1; // "add" | "remove"
  string url = 2; // used only for "remove"; ignored when auto_assign = true
  string name = 3; // unused (reserved for remove display purposes)
  string region = 4; // unused (reserved for remove display purposes)
  // When true, the SDK selects the next node via keyed Fisher-Yates over
  // the known pool (dsm_env_config.toml nodes minus currently active nodes).
  // The user does NOT choose which node is added — required for security
  // and even distribution across the network.
  bool auto_assign = 5;
}

message StorageNodeManageResponse {
  bool success = 1;
  string error = 2;
  repeated string current_endpoints = 3; // updated list after operation
  // Populated when auto_assign = true: the URL of the node the SDK assigned.
  string assigned_url = 4;
}

// ========================= Storage Replica Set Config =========================
// UI/local configuration persisted via protobuf (no JSON/localStorage).
// Storage nodes are independent, free-market participants — any N nodes can
// serve as a device's replica set. Keyed Fisher-Yates reshuffles on churn.
// There is no fixed cluster; each device independently selects its replica set.
enum StorageNodeAuthType {
  STORAGE_NODE_AUTH_UNSPECIFIED = 0;
  STORAGE_NODE_AUTH_NONE = 1;
  STORAGE_NODE_AUTH_BEARER = 2;
  STORAGE_NODE_AUTH_BASIC = 3;
}

message StorageNodeAuthProto {
  StorageNodeAuthType type = 1;
  string token = 2;
  string username = 3;
  string password = 4;
}

message StorageNodeEndpointProto {
  string url = 1;
  bool is_primary = 2;
  StorageNodeAuthProto auth = 3;
  string tls_cert = 4;
  reserved 5;
  string name = 6; // human-readable label
  string region = 7; // AWS region or geographic label
}

message StorageReplicaSetConfig {
  repeated StorageNodeEndpointProto nodes = 1;
  string primary_node = 2;
  bool read_failover_enabled = 3;
  string write_strategy = 4;
  uint32 retry_max = 5;
  uint32 retry_backoff_ms = 6;
  uint32 verification_quorum = 7;
}

// ============================ DIAGNOSTICS EXPORT ============================
message NodeHealthEntry {
  string url = 1;
  string status = 2; // "healthy" | "degraded" | "down" | "unknown"
  string last_error = 3;
  string name = 4;
  string region = 5;
  uint32 latency_ms = 6;
  uint64 objects_put_total = 7;
  uint64 objects_get_total = 8;
  uint64 bytes_written_total = 9;
  uint64 bytes_read_total = 10;
}

message DiagnosticsExport {
  StorageReplicaSetConfig replica_set_config = 1;
  repeated NodeHealthEntry node_health = 2;
  repeated string recent_errors = 3;
  string mode = 4; // "local" | "production"
  string platform = 5;
  string version = 6;
}

// ============================ POLICY FILE (Canonical) ============================
message PolicyRoleProto {
  string id = 1;
  string name = 2;
  repeated string permissions = 3; // sorted
}

message PolicyConditionProto {
  oneof kind {
    IdentityConstraintProto identity_constraint = 1;
    VaultEnforcementProto vault_enforcement = 2;
    OperationRestrictionProto operation_restriction = 3;
    LogicalTimeConstraintProto logical_time_constraint = 4;
    EmissionsScheduleProto emissions_schedule = 5;
    CreditBundlePolicyProto credit_bundle_policy = 6;
    CustomConstraintProto custom = 7;
    BitcoinTapConstraintProto bitcoin_tap_constraint = 8;
  }
}

message IdentityConstraintProto { repeated string allowed_identities = 1; bool allow_derived = 2; }
message VaultEnforcementProto { VaultConditionProto condition = 1; }
message OperationRestrictionProto { repeated string allowed_operations = 1; }
message LogicalTimeConstraintProto { uint64 min_tick = 1; uint64 max_tick = 2; }
message EmissionsScheduleProto { uint64 total_supply = 1; uint32 shard_depth = 2; uint32 schedule_steps = 3; uint64 initial_step_emissions = 4; uint64 initial_step_amount = 5; }
message CreditBundlePolicyProto { uint64 bundle_size = 1; string debit_rule = 2; string refill_rule = 3; }

// Bitcoin tap safety constraints (dBTC §12). Protocol law — frozen into policy_commit.
message BitcoinTapConstraintProto {
  uint32 max_successor_depth = 1; // Maximum successor vault generations (§12.1.1)
  uint64 min_vault_balance_sats = 2; // Minimum vault balance after fractional exit (§12.1.2)
  uint64 dust_floor_sats = 3; // Bitcoin dust floor — hard floor for any UTXO output
  uint64 min_confirmations = 4; // Required block depth for entry/exit anchors (§12.1.3)
}

// IMPORTANT: `parameters_kv` is the canonical/deterministic representation.
// `parameters` (map) is UI/interop only and MUST NOT be used in hashed preimages.
message CustomConstraintProto {
  string constraint_type = 1;

  // UI/interop only (non-deterministic ordering). Do not hash.
  map<string, string> parameters = 2;

  // Canonical: sorted by key before hashing/signing.
  repeated ParamKV parameters_kv = 3;
}

message VaultConditionProto {
  oneof kind {
    bytes hash = 1;
    uint64 minimum_balance = 2;
    string vault_type = 3;
    bytes smart_policy = 4;
  }
}

message CanonicalPolicy {
  string author = 1;
  repeated PolicyConditionProto conditions = 2;
  repeated PolicyRoleProto roles = 3;
}

message StoredPolicy {
  string name = 1;
  string revision = 2;
  uint64 created_tick = 3; // deterministic tick (UI/ops only)
  string author = 4;
  string description = 5;
  repeated PolicyConditionProto conditions = 6;
  repeated PolicyRoleProto roles = 7;
  map<string, string> metadata = 8;
}

// ====================== WebView Bridge Messages ======================
// Formal schema for SinglePathWebViewBridge binary RPC calls
// Replaces manual byte slicing with protobuf serialization

message BridgeRpcRequest {
  string method = 1 [(dsm_max_len)=128];
  oneof payload {
    EmptyPayload empty = 2;
    BytesPayload bytes = 3;
    StringPayload string = 4;
    PreferencePayload preference = 5;
    AppRouterPayload app_router = 6;
    CreateGenesisPayload create_genesis = 7;
    BleContactPayload ble_contact = 8;
    BleAddressPayload ble_address = 9;
    BleIdentityPayload ble_identity = 10;
    BilateralPayload bilateral = 11;
  }
}

message BridgeRpcResponse {
  oneof result {
    SuccessResponse success = 1;
    ErrorResponse error = 2;
  }
}

message EmptyPayload {}

message BytesPayload {
  bytes data = 1 [(dsm_max_len)=65535];
}

message StringPayload {
  string value = 1 [(dsm_max_len)=1024];
}

message PreferencePayload {
  string key = 1 [(dsm_max_len)=256];
  optional string value = 2 [(dsm_max_len)=4096]; // null for get, set for set
}

message AppRouterPayload {
  string method_name = 1 [(dsm_max_len)=256];
  bytes args = 2 [(dsm_max_len)=65535];
}

message CreateGenesisPayload {
  string locale = 1 [(dsm_max_len)=16];
  string network_id = 2 [(dsm_max_len)=64];
  bytes entropy = 3 [(dsm_fixed_len)=32];
}

message BleContactPayload {
  bytes pairing_data = 1 [(dsm_max_len)=4096];
}

message BleAddressPayload {
  bytes device_id = 1 [(dsm_fixed_len)=32];
}

message BleIdentityPayload {
  bytes genesis_hash = 1 [(dsm_fixed_len)=32];
  bytes device_id = 2 [(dsm_fixed_len)=32];
}

message BilateralPayload {
  bytes commitment = 1 [(dsm_fixed_len)=32];
  optional string reason = 2 [(dsm_max_len)=1024]; // for reject operations
}

message SuccessResponse {
  bytes data = 1 [(dsm_max_len)=65535];
}

message ErrorResponse {
  uint32 error_code = 1;
  string message = 2 [(dsm_max_len)=1024];
  // Base32-Crockford debug string encoding of the canonical ErrorResponse bytes
  // Useful for human-readable diagnostics without introducing JSON.
  string debug_b32 = 3 [(dsm_max_len)=4096];
}

// DLV stitched receipt storage (§7.3, §18.4)

message DlvReceiptSubmission {
  bytes sigma = 1 [(dsm_fixed_len)=32]; // 32-byte BLAKE3 commitment
  string vault_id = 2 [(dsm_max_len)=256];
  bytes receipt_proto = 3 [(dsm_max_len)=65535]; // canonical ReceiptCommit protobuf
  bytes sig_a = 4 [(dsm_max_len)=65535]; // SPHINCS+ sig from party A
  bytes sig_b = 5 [(dsm_max_len)=65535]; // SPHINCS+ sig from party B
}

message DlvReceiptQuery {
  string vault_id = 1 [(dsm_max_len)=256]; // query by vault
  bytes sigma = 2 [(dsm_fixed_len)=32]; // OR query by sigma
}

message DlvReceiptResponse {
  repeated DlvReceiptSubmission receipts = 1;
}

// ─── Storage Node Regulation (clockless, signature-free) ────────────────────

// Capacity up-signal: node utilization >= U_UP for w consecutive cycles.
// Domain: "DSM/signal/up\0"
message UpSignalV3 {
  bytes node_id   = 1; // 32 bytes
  uint64 capacity = 2; // declared capacity C
  repeated bytes anchors = 3; // H(B_{t-w+1}),...,H(B_t) ByteCommit digests
}

// Capacity down-signal: node utilization <= U_DOWN for w consecutive cycles.
// Domain: "DSM/signal/down\0"
message DownSignalV3 {
  bytes node_id   = 1; // 32 bytes
  uint64 capacity = 2;
  repeated bytes anchors = 3;
}

// Active node registry: sorted ascending lexicographic order.
// Domain: "DSM/registry\0"
message RegistryV3 {
  repeated bytes node_ids = 1; // sorted ascending lex
}

// Applicant pack for joining the active storage-node set.
// Domain: "DSM/apply\0"
message ApplicantV3 {
  bytes hw_bind   = 1; // C-DBRW hardware binding
  bytes env_fp    = 2; // environment fingerprint
  uint64 capacity = 3; // declared capacity C
  bytes stake_dlv = 4; // StakeDLV address
  bytes seed_app  = 5; // H("DSM/app_seed\0" || hw_bind || G)
}

// DrainProof: d consecutive ByteCommits with bytes_used=0 (stake exit).
// Domain: "DSM/drain\0"
message DrainProofV3 {
  bytes node_id = 1; // 32 bytes
  repeated uint64 cycle_indices = 2; // d consecutive cycle indices
  repeated bytes bytecommit_digests = 3; // H(B_t) for each cycle
}

// Storage payment receipt for PaidK spend-gate.
// Domain: "DSM/pay/storage\0"
message StoragePaymentReceiptV3 {
  bytes device_id        = 1; // 32 bytes, payer
  bytes operator_node_id = 2; // 32 bytes, recipient operator
  uint64 amount          = 3; // payment amount (>= FLAT_RATE)
  bytes receipt_digest   = 4; // H("DSM/pay/storage\0" || ProtoDet(this without digest))
}

// Registry update result (informational, for mirroring).
message RegistryUpdateV3 {
  bytes previous_registry_addr = 1;
  bytes new_registry_addr      = 2;
  int64 position_delta         = 3; // dP = |U| - |D|
  repeated bytes added_nodes   = 4;
  repeated bytes removed_nodes = 5;
}

// PaidK status response.
message PaidKStatusV3 {
  bool satisfied         = 1;
  uint32 distinct_operators = 2;
  uint32 required_k      = 3;
}

// DrainProof verification response (advisory).
message DrainVerifyV3 {
  bool verified           = 1;
  bytes node_id           = 2;
  uint64 start_cycle      = 3;
  uint64 end_cycle        = 4;
  uint32 consecutive_empty = 5;
}
