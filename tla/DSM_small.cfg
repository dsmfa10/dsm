SPECIFICATION Spec

\* Concrete DSM must refine the irreducible truth layer.
\* Refinement is checked via the explicit property `ConcreteRefinesAbstract`.

CONSTANT
    DeviceIds = {d1, d2, d3}
    GenesisIds = {g1}
    MaxDevices = 2
    MaxPayload = 1
    VaultIds = {v1}
    MaxVaults = 1
    ShardDepth = 1
    MaxEmissions = 1
    EmissionAmount = 1
    MaxSupply = 1
    MaxNet = 4
    MaxDupPerMsg = 1
    MaxStep = 6
    UseHarness = TRUE

INVARIANT
    TypeInvariant
    NoDuplicateDevices
    ActiveRelationshipsSymmetric
    VaultsOwnedByCreator
    OfflineSessionsSymmetric
    DJTESafety
    ConcreteRefinesAbstract
    RefinementStrengthening
    SourceVaultBounded

\* ConcreteRefinesAbstract is a state predicate; keep it as an INVARIANT so
\* TLC checks it in all reachable states (not only the initial state).

\* Step-bounded regression: explore real transitions but stop at MaxStep.
PROPERTY
    SpentJapsNeverShrink
    CommitNeverDecreasesConcrete
    SourceRemainingNeverIncreases

CONSTRAINT
    StepBound
