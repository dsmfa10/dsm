type: "policy"
name: "DSM_Stablecoin_Policy"
version: "1.2.0"
description: "Content-addressed policy for DSM stablecoin transfers"

rules:
  - name: "daily_limit_check"
    condition:
      condition_type: "amount_limit"
      parameters:
        max_amount: "10000"
        currency: "DSM"
    action:
      type: "allow"
    priority: 100

  - name: "high_value_approval"
    condition:
      condition_type: "signature_required"
      parameters:
        count: "2"
        reason: "manual_review"
    action:
      type: "require_approval"
    priority: 200

  - name: "restricted_countries_block"
    condition:
      condition_type: "blacklist"
      parameters:
        countries: "XX,YY,ZZ"
        check_type: "jurisdiction"
    action:
      type: "deny"
    priority: 300

  - name: "night_iteration_delay"
    condition:
      condition_type: "iteration_window"
      parameters:
        start_iteration: "22000"
        end_iteration: "28000"
        amount_threshold: "5000"
    action:
      type: "delay"
      iterations: 28800
    priority: 75

metadata:
  issuer: "DSM_Foundation"
  compliance_framework: "DSM_CF_v2.1"
