codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: 50..90
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%
    changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: rust
      statuses:
        - type: project
          target: auto
          threshold: 1%
    - name: frontend
      statuses:
        - type: project
          target: auto
          threshold: 1%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "**/target/**"
  - "**/node_modules/**"
  - "dsm_client/new_frontend/coverage/**"
