# DeTFi Pattern: Stablecoin Transfer Policy (CPTA)
#
# A Content-Addressed Token Policy governing stablecoin transfers.
# Rules are evaluated by priority (highest first). The first matching
# rule determines the action.
#
# Rule precedence:
#   1. Blacklisted jurisdictions are always denied       (priority 300)
#   2. High-value transfers require manual approval      (priority 200)
#   3. Standard transfers within limits are allowed      (priority 100)
#   4. Off-hours transfers are delayed by iterations     (priority 75)
#
# Difficulty: Beginner
#
# Usage:
#   dsm-gen validate examples/detfi/policies/01-stablecoin-transfer.yaml
#   dsm-gen client  examples/detfi/policies/01-stablecoin-transfer.yaml --lang ts

type: "policy"
name: "StablecoinTransferPolicy"
version: "1.0.0"
description: "CPTA for regulated stablecoin with compliance guardrails"

rules:
  - name: "jurisdiction_block"
    condition:
      condition_type: "blacklist"
      parameters:
        jurisdictions: "SANCTIONED_A,SANCTIONED_B,SANCTIONED_C"
        check_type: "sender_and_recipient"
    action:
      type: "deny"
    priority: 300

  - name: "high_value_review"
    condition:
      condition_type: "signature_required"
      parameters:
        count: "2"
        reason: "compliance_review"
        threshold_amount: "50000"
    action:
      type: "require_approval"
    priority: 200

  - name: "standard_transfer_limit"
    condition:
      condition_type: "amount_limit"
      parameters:
        max_amount: "10000"
        currency: "DSM"
        window_iterations: "86400"
    action:
      type: "allow"
    priority: 100

  - name: "off_hours_delay"
    condition:
      condition_type: "iteration_window"
      parameters:
        start_iteration: "22000"
        end_iteration: "28000"
        amount_threshold: "5000"
    action:
      type: "delay"
      iterations: 14400
    priority: 75

metadata:
  issuer: "DSM_Foundation"
  compliance_framework: "DSM_CF_v2.1"
  pattern: "stablecoin_compliance"
